<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Layout</title>
    <style>
      body {
        background-color: grey;
      }
      * {
        margin: 0px;
        padding: 0px;
      }
      header {
        position: sticky;
        top: 0;
      }
      nav {
        height: 10vh;
        background-color: pink;
      }
      main {
        background-color: black;
        padding: 15px;
      }
      .boxes {
        display: flex;
        margin: 5px;
        background-color: green;
        text-align: center;
      }
      .boxa {
        background-color: aqua;
        margin: 20px 25px;
        height: 250px;
        width: 40%;
      }
      .boxb {
        background-color: rgb(255, 0, 38);
        margin: 20px 25px;
        height: 250px;
        width: 40%;
      }
      .box3 {
        color: aliceblue;
        border: 1px solid rgb(240, 234, 234);
        margin: 10px;
        height: 40px;
        border-radius: 7px;
        text-align: center;
      }
      .orange {
        position: fixed;
        background-color: orange;
        width: 12px;
        height: 12px;
        border-radius: 60px;
        right: 12px;
        bottom: 30px;
      }
      .box4 {
        height: 10vh;
        background-color: pink;
      }
    </style>
  </head>
  <body>
    <header>
      <nav class="box1"></nav>
    </header>
    <main>
      <div class="boxes">
        <div class="boxa"></div>
        <div class="boxb"></div>
      </div>
      <div class="box3">Welcome to my layout.</div>
      <div class="orange"></div>
    </main>
    <footer class="box4"></footer>
  </body>
</html>
